server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://app:8443/api/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OAuth2 login initiation
    location /oauth2/authorization/ {
        proxy_pass https://app:8443/oauth2/authorization/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OAuth2 callback from provider
    location /login/oauth2/ {
        proxy_pass https://app:8443/login/oauth2/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback (handles /oauth2/success and all other frontend routes)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    return 301 https://$host$request_uri;
}
