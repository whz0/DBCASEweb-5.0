services:
  app:
    build: .
    ports:
      - "8080:8080"
      - "8443:8443"
      - "5005:5005"
    container_name: DBCaseApp
    env_file: .env
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/dbcase
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SSL_KEY_STORE=${SSL_KEY_STORE}
      - SSL_KEY_STORE_PASSWORD=${SSL_KEY_STORE_PASSWORD}
      - SSL_KEY_ALIAS=${SSL_KEY_ALIAS}
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005

  db:
    image: 'postgres:17.9-alpine3.23'
    container_name: DBCaseDB
    ports:
      - "5431:5432"
    volumes:
      - dbcaseDB:/var/lib/postgresql/data
      - ./db/script.sql:/docker-entrypoint-initdb.d/script.sql
    environment:
      - POSTGRES_DB=dbcase
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
volumes:
  dbcaseDB: