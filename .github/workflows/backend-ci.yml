name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - 'DBCase/backend/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'DBCase/backend/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: DBCase/backend/pom.xml

      - name: Grant execute permission for mvnw
        run: chmod +x DBCase/backend/mvnw

      - name: Build and Test with Maven
        working-directory: DBCase/backend
        run: ./mvnw -B test
